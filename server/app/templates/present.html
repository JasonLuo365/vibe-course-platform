<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ assignment.title }} - 课堂展示 - Vibe</title>
  <link rel="stylesheet" href="/static/present.css">
</head>
<body class="present-body">
  <div id="stage" class="stage"></div>
  <div id="counter" class="counter"></div>

  <script>
    const GROUPS = {{ groups_json|safe }};

    function getIndex() {
      const hash = location.hash.replace('#', '');
      const n = parseInt(hash, 10);
      if (!isNaN(n) && n >= 0 && n < GROUPS.length) return n;
      return 0;
    }

    function setIndex(i) {
      if (i < 0) i = 0;
      if (i >= GROUPS.length) i = GROUPS.length - 1;
      location.hash = i;
    }

    function render() {
      const i = getIndex();
      const g = GROUPS[i] || { group_name: '无数据', members: [], highlight: null, metrics: {}, screenshots: [] };
      const stage = document.getElementById('stage');
      const counter = document.getElementById('counter');

      const membersHtml = g.members.map(m => `
        <div class="member-pill">
          <span class="member-name">${escapeHtml(m.name)}</span>
          <span class="member-no">${escapeHtml(m.student_no)}</span>
          ${m.final_grade ? `<span class="member-grade">${escapeHtml(m.final_grade)}</span>` : ''}
        </div>
      `).join('');

      let highlightHtml = '';
      if (g.highlight) {
        const contribution = g.highlight.contribution_json
          ? JSON.stringify(g.highlight.contribution_json)
          : '';
        highlightHtml = `
          <div class="highlight-box">
            <div class="highlight-grade">小组 AI 等级：${escapeHtml(g.highlight.grade)}</div>
            <p class="highlight-text">${escapeHtml(g.highlight.rationale_head)}</p>
            ${contribution ? `<pre class="highlight-contribution">${escapeHtml(contribution)}</pre>` : ''}
          </div>
        `;
      }

      let metricsHtml = '';
      if (g.metrics && (g.metrics.sessions || g.metrics.turns)) {
        metricsHtml = `
          <div class="metrics-bar">
            <span>会话 ${g.metrics.sessions || 0}</span>
            <span>交互 ${g.metrics.turns || 0}</span>
            <span>时长 ${g.metrics.duration_min || 0} min</span>
          </div>
        `;
      }

      let carouselHtml = '';
      if (g.screenshots && g.screenshots.length) {
        carouselHtml = `
          <div class="carousel">
            ${g.screenshots.map(src => `<img src="${escapeHtml(src)}" alt="截图" loading="lazy">`).join('')}
          </div>
        `;
      }

      stage.innerHTML = `
        <h1 class="group-name">${escapeHtml(g.group_name)}</h1>
        <div class="members-row">${membersHtml}</div>
        ${highlightHtml}
        ${metricsHtml}
        ${carouselHtml}
      `;

      counter.textContent = GROUPS.length ? `${i + 1} / ${GROUPS.length}` : '0 / 0';
    }

    function escapeHtml(text) {
      if (text === null || text === undefined) return '';
      const div = document.createElement('div');
      div.textContent = String(text);
      return div.innerHTML;
    }

    window.addEventListener('hashchange', render);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') {
        setIndex(getIndex() + 1);
      } else if (e.key === 'ArrowLeft') {
        setIndex(getIndex() - 1);
      }
    });

    render();
  </script>
</body>
</html>
