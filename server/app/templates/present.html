<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ assignment.title }} - 课堂展示 - Vibe</title>
  <link rel="stylesheet" href="/static/present.css">
</head>
<body class="present-body">
  <header class="present-header"><span class="present-mode">作品展示</span><span>{{ assignment.title }}</span></header>
  <div id="stage" class="stage"></div>
  <div id="counter" class="counter"></div>

  <script>
    const GROUPS = {{ groups|tojson }};

    function getIndex() {
      const hash = location.hash.replace('#', '');
      const n = parseInt(hash, 10);
      if (!isNaN(n) && n >= 0 && n < GROUPS.length) return n;
      return 0;
    }

    function setIndex(i) {
      if (i < 0) i = 0;
      if (i >= GROUPS.length) i = GROUPS.length - 1;
      location.hash = i;
    }

    function render() {
      const i = getIndex();
      const g = GROUPS[i] || { group_name: '无数据', members: [], metrics: {}, screenshots: [], code_highlights: [] };
      const stage = document.getElementById('stage');
      const counter = document.getElementById('counter');

      const membersHtml = g.members.map(m => `
        <div class="member-pill">
          <span class="member-name">${escapeHtml(m.name)}</span>
          <span class="member-no">${escapeHtml(m.student_no)}</span>
        </div>
      `).join('');

      const codeHtml = g.code_highlights && g.code_highlights.length ? `
        <section class="work-card">
          <p class="work-label">提交的项目文件</p>
          <div class="file-chips">${g.code_highlights.map(name => `<span>${escapeHtml(name)}</span>`).join('')}</div>
        </section>` : '';

      let metricsHtml = '';
      if (g.metrics && (g.metrics.sessions || g.metrics.turns)) {
        metricsHtml = `
          <div class="metrics-bar">
            <span>会话 ${g.metrics.sessions || 0}</span>
            <span>交互 ${g.metrics.turns || 0}</span>
            <span>时长 ${g.metrics.duration_min || 0} min</span>
          </div>
        `;
      }

      let carouselHtml = '';
      if (g.screenshots && g.screenshots.length) {
        carouselHtml = `
          <div class="carousel">
            ${g.screenshots.map(src => `<img src="${escapeHtml(src)}" alt="截图" loading="lazy">`).join('')}
          </div>
        `;
      }

      stage.innerHTML = `
        <h1 class="group-name">${escapeHtml(g.group_name)}</h1>
        <div class="members-row">${membersHtml}</div>
        ${metricsHtml}
        ${codeHtml}
        ${carouselHtml}
      `;

      counter.textContent = GROUPS.length ? `${i + 1} / ${GROUPS.length}` : '0 / 0';
    }

    function escapeHtml(text) {
      if (text === null || text === undefined) return '';
      const div = document.createElement('div');
      div.textContent = String(text);
      return div.innerHTML;
    }

    window.addEventListener('hashchange', render);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') {
        setIndex(getIndex() + 1);
      } else if (e.key === 'ArrowLeft') {
        setIndex(getIndex() - 1);
      }
    });

    render();
  </script>
</body>
</html>
