{% extends "base.html" %}
{% block title %}评估提示词配置 - Vibe{% endblock %}
{% block content %}
<section class="page-heading"><div><p class="eyebrow">作业评估配置</p><h1>{{ assignment.title }}</h1><p class="page-summary">作业码：<code>{{ assignment.code }}</code>。提示词留空时只使用通用评价规则。</p></div></section>
<section class="card"><form method="post" action="/assignments/{{ assignment.id }}/evaluation-config">
  <label for="evaluation_profile">评价提示词模板</label>
  <select id="evaluation_profile" name="evaluation_profile" required>{% for value, label in prompt_profiles %}<option value="{{ value }}" {% if value == (assignment.evaluation_profile or 'generic_experiment') %}selected{% endif %}>{{ label }}</option>{% endfor %}</select>
  <p class="meta">选择适合本作业的已有评分提示词模板；专属规则可在下方继续补充。</p>
  <label for="evaluation_instructions">本作业专属评估提示词</label>
  <textarea id="evaluation_instructions" name="evaluation_instructions" rows="18" maxlength="12000" placeholder="可留空。后续可在这里输入本作业的评估重点、参考答案、扣分边界和反馈要求。">{{ assignment.evaluation_instructions or '' }}</textarea>
  <p class="meta">此内容只应用于本作业，不会影响其他老师或其他作业。</p>
  <button type="submit" class="button">保存评估配置</button><a class="back-link" href="/assignments/{{ assignment.id }}/board">取消</a>
</form></section>
{% endblock %}
