{% extends "base.html" %}

{% block title %}重置学生密码 - Vibe{% endblock %}

{% block content %}
<div class="login-card">
  <p class="eyebrow">STUDENT PASSWORD</p>
  <h1>重置密码</h1>
  <p class="login-help">请输入学号并设置新密码。密码要求为 8–12 位，输入内容会直接显示。</p>
  <form id="student-password-reset-form" action="/student/password/reset">
    <label for="reset-student-no">学号</label>
    <input type="text" id="reset-student-no" autocomplete="username" required autofocus>

    <label for="reset-password">新密码</label>
    <input type="text" id="reset-password" minlength="8" maxlength="12" autocomplete="new-password" required>

    <label for="reset-password-confirm">确认新密码</label>
    <input type="text" id="reset-password-confirm" minlength="8" maxlength="12" autocomplete="new-password" required>

    <button class="button login-submit" type="submit">重置密码</button>
  </form>
  <p id="student-password-reset-message" class="error" role="alert"></p>
  <a class="text-button" href="/login">返回登录</a>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('student-password-reset-form').addEventListener('submit', async function (event) {
  event.preventDefault();
  const message = document.getElementById('student-password-reset-message');
  message.textContent = '';
  const res = await fetch('/student/password/reset', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      student_no: document.getElementById('reset-student-no').value,
      password: document.getElementById('reset-password').value,
      password_confirm: document.getElementById('reset-password-confirm').value,
    }),
  });
  const data = await res.json().catch(() => ({}));
  message.textContent = res.ok
    ? '如学号有效，密码已重置；请使用新密码登录。'
    : (data.error?.message || '重置失败，请稍后重试。');
});
</script>
{% endblock %}
